name: Firebase App Distribution

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes for testers"
        required: false
        default: "Test build from CI"

jobs:
  build-and-distribute:
    name: Build & Distribute to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Validate required secrets
        env:
          HAS_GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
          HAS_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_ANDROID != '' }}
          HAS_FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON != '' }}
          HAS_SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}
        run: |
          failed=false
          if [ "$HAS_GOOGLE_SERVICES" != "true" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is not configured."
            failed=true
          fi
          if [ "$HAS_FIREBASE_APP_ID" != "true" ]; then
            echo "::error::FIREBASE_APP_ID_ANDROID secret is not configured."
            failed=true
          fi
          if [ "$HAS_FIREBASE_SA" != "true" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON secret is not configured."
            failed=true
          fi
          if [ "$HAS_SIGNING_KEYSTORE" != "true" ]; then
            echo "::warning::SIGNING_KEYSTORE_BASE64 is not configured. Debug signing will be used."
          fi
          if [ "$failed" = "true" ]; then exit 1; fi

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Decode Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT_JSON" | base64 -d > /tmp/firebase-service-account.json

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > app/release.keystore
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFile: /tmp/firebase-service-account.json
          groups: qa-testers
          file: app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: ${{ github.event.inputs.release_notes || format('Build {0} — {1}', github.run_number, github.sha) }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
